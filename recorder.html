<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoParrot v1.9.1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .container {
      padding: 16px;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    /* ヘッダー */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-info   { flex: 1; }
    .header-title  { font-size: 14px; font-weight: 700; color: #fff; }
    .header-sub    { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
    .header-version { font-size: 10px; color: #888; }
    /* プランバッジ */
    .plan-badge {
      font-size: 9px; font-weight: 700; padding: 1px 6px;
      border-radius: 4px; letter-spacing: 0.5px;
    }
    .plan-badge.free { background: #2a2a3a; color: #888; border: 1px solid #3a3a5a; }
    .plan-badge.pro  { background: linear-gradient(90deg, #6c63ff, #3ecfcf); color: #fff; }
    /* 設定ボタン */
    .btn-settings {
      width: 28px; height: 28px;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-settings:hover { background: #22223a; }

    /* ===== 設定パネル ===== */
    .settings-panel {
      display: none;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 10px; padding: 12px;
      flex-direction: column; gap: 10px;
    }
    .settings-panel.show { display: flex; }
    .settings-title {
      font-size: 12px; font-weight: 700; color: #aaa;
      border-bottom: 1px solid #2a2a4a; padding-bottom: 8px;
    }
    .key-input-row {
      display: flex; gap: 7px; align-items: center;
    }
    .key-input {
      flex: 1; padding: 7px 10px;
      background: #0f0f1a; border: 1px solid #3a3a5a;
      border-radius: 8px; color: #e0e0f0; font-size: 12px;
      font-family: monospace; letter-spacing: 1px;
      outline: none;
    }
    .key-input:focus { border-color: #6c63ff; }
    .key-input::placeholder { color: #444; letter-spacing: 0; }
    .btn-key-apply {
      padding: 7px 12px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border: none; border-radius: 8px;
      color: #fff; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .btn-key-apply:hover { opacity: .9; }
    .btn-key-clear {
      padding: 7px 10px;
      background: #2a2a3a; border: 1px solid #3a3a5a;
      border-radius: 8px; color: #888; font-size: 11px;
      cursor: pointer;
    }
    .btn-key-clear:hover { color: #ff8888; border-color: #664444; }
    .key-status {
      font-size: 11px; text-align: center; padding: 4px 0;
    }
    .key-status.ok  { color: #6aff6a; }
    .key-status.err { color: #ff8888; }
    .settings-note {
      font-size: 10px; color: #555; text-align: center;
    }

    /* モード切替タブ */
    .mode-tabs {
      display: flex;
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      overflow: hidden;
    }
    .mode-tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .mode-tab.active {
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      color: #fff;
    }
    .mode-tab:not(.active):hover { color: #aaa; background: #22223a; }

    /* 対象タブ名 */
    .target-tab {
      font-size: 10px; color: #666;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 6px; padding: 5px 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .target-tab span { color: #8888cc; }

    /* 映像プレビュー */
    .video-preview-wrap {
      display: none;
      background: #000;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      overflow: hidden;
      position: relative;
    }
    .video-preview-wrap.show { display: block; }
    video#preview {
      display: block;
      width: 100%;
      height: 90px;
      object-fit: contain;
      background: #000;
    }
    .video-badge {
      position: absolute; top: 5px; right: 7px;
      font-size: 10px; color: #3ecfcf;
      background: rgba(0,0,0,0.6);
      border-radius: 4px; padding: 2px 6px;
    }

    /* 波形 */
    .waveform-container {
      background: #1a1a2e; border-radius: 10px;
      padding: 10px; border: 1px solid #2a2a4a; overflow: hidden;
    }
    .waveform-container.hidden { display: none; }
    canvas#waveform { display: block; width: 100%; height: 65px; }
    .waveform-label { font-size: 10px; color: #555; text-align: center; margin-top: 4px; }

    /* ステータスバー */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #444; transition: background 0.3s; flex-shrink: 0;
    }
    .status-dot.recording { background: #ff4444; animation: pulse 1s infinite; }
    .status-dot.paused    { background: #ffaa00; }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:.5; transform:scale(1.2); }
    }
    .status-text { font-size: 12px; color: #aaa; flex: 1; }
    .status-text.recording { color: #ff8888; }
    .status-text.paused    { color: #ffcc66; }
    .timer { font-size: 13px; font-weight: 700; color: #6c63ff; font-variant-numeric: tabular-nums; }
    /* 残り時間（無料版） */
    .timer-limit {
      font-size: 10px; color: #666;
      font-variant-numeric: tabular-nums;
    }
    .timer-limit.warn { color: #ffaa00; }

    /* ボタン群 */
    .btn-group { display: flex; gap: 7px; }
    .btn {
      flex: 1; padding: 10px 0;
      border: none; border-radius: 10px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-start   { background: linear-gradient(135deg, #6c63ff, #3ecfcf); color: #fff; }
    .btn-start:hover:not(:disabled)   { opacity:.9; box-shadow: 0 4px 15px rgba(108,99,255,.4); }
    .btn-pause   { background: linear-gradient(135deg, #ffaa00, #ff6600); color: #fff; }
    .btn-pause:hover:not(:disabled)   { opacity:.9; box-shadow: 0 4px 15px rgba(255,170,0,.4); }
    .btn-stop    { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; }
    .btn-stop:hover:not(:disabled)    { opacity:.9; box-shadow: 0 4px 15px rgba(255,68,68,.4); }
    .btn-discard { background: linear-gradient(135deg, #444466, #222244); color: #aaa; border: 1px solid #3a3a5a; }
    .btn-discard:hover:not(:disabled) { background: linear-gradient(135deg, #553333, #331111); color: #ff8888; border-color: #664444; }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    /* MP3オプション */
    .option-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: #1a1a2e; border-radius: 8px; border: 1px solid #2a2a4a;
    }
    .option-row.hidden { display: none; }
    .option-row input[type="checkbox"] {
      width: 15px; height: 15px; accent-color: #6c63ff; cursor: pointer; flex-shrink: 0;
    }
    .option-label { font-size: 12px; color: #aaa; cursor: pointer; flex: 1; }
    .option-badge {
      font-size: 10px; color: #6c63ff;
      background: #1e1e3a; border: 1px solid #3a3a6a;
      border-radius: 4px; padding: 2px 6px;
    }

    /* 映像モード注意書き */
    .video-note {
      display: none;
      font-size: 10px; color: #666; text-align: center;
      padding: 5px 10px;
      background: #1a1a2e; border-radius: 6px; border: 1px solid #2a2a4a;
    }
    .video-note.show { display: block; }

    /* MP3変換進捗バー */
    .progress-wrap {
      display: none;
      padding: 10px 12px;
      background: #1a1a3a; border: 1px solid #3a3a6a;
      border-radius: 8px;
    }
    .progress-wrap.show { display: block; }
    .progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 7px;
    }
    .progress-label { font-size: 11px; color: #8888ff; }
    .progress-pct   { font-size: 12px; font-weight: 700; color: #3ecfcf; font-variant-numeric: tabular-nums; }
    .progress-bar-bg {
      width: 100%; height: 8px;
      background: #2a2a4a; border-radius: 4px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      border-radius: 4px;
      width: 0%;
      transition: width 0.15s ease;
    }

    /* メッセージ */
    .saved-msg {
      display: none; padding: 7px 12px;
      background: #1a3a1a; border: 1px solid #2a6a2a;
      border-radius: 8px; font-size: 11px; color: #6aff6a; text-align: center;
    }
    .saved-msg.show { display: block; animation: fadeIn .3s ease; }
    .error-msg {
      display: none; padding: 7px 12px;
      background: #3a1a1a; border: 1px solid #6a2a2a;
      border-radius: 8px; font-size: 11px; color: #ff8888; text-align: center;
    }
    .error-msg.show { display: block; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(4px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .format-info { font-size: 10px; color: #333; text-align: center; }

    /* モニタリングトグル */
    .monitor-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 8px;
    }
    .monitor-label { font-size: 12px; color: #aaa; flex: 1; }
    .monitor-status { font-size: 11px; font-weight: 700; }
    .monitor-status.on  { color: #3ecfcf; }
    .monitor-status.off { color: #555; }
    .btn-monitor {
      padding: 5px 12px;
      border: none; border-radius: 7px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-monitor.on  { background: linear-gradient(135deg, #3ecfcf, #6c63ff); color: #fff; }
    .btn-monitor.off { background: #2a2a3a; color: #666; border: 1px solid #3a3a5a; }

    /* アップデートバッジ */
    .update-badge {
      display: none;
      align-items: center; gap: 5px;
      padding: 6px 12px;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px; font-weight: 700; color: #fff;
      animation: pulse 2s infinite;
      text-decoration: none;
    }
    .update-badge.show { display: flex; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ヘッダー -->
    <div class="header">
      <div class="header-icon">🦜</div>
      <div class="header-info">
        <div class="header-title">EchoParrot</div>
        <div class="header-sub">
          <span class="header-version">v1.9.1 Beta</span>
          <span class="plan-badge free" id="planBadge">FREE</span>
        </div>
      </div>
      <button class="btn-settings" id="btnSettings" title="設定">⚙️</button>
    </div>

    <!-- アップデート通知 -->
    <a class="update-badge" id="updateBadge" href="#" target="_blank">
      🆕 <span id="updateText">新しいバージョンがあります</span>
    </a>

    <!-- 設定パネル（折りたたみ） -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-title">⚙️ ライセンス設定</div>
      <div class="key-input-row">
        <input type="password" class="key-input" id="keyInput"
               placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" autocomplete="off" />
        <button class="btn-key-apply" id="btnKeyApply">適用</button>
        <button class="btn-key-clear" id="btnKeyClear">解除</button>
      </div>
      <div class="key-status" id="keyStatus"></div>
      <div class="settings-note">シリアルキーはローカルに暗号化して保存されます</div>
    </div>

    <!-- モード切替タブ -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabAudio">🎙 音声のみ</button>
      <button class="mode-tab"        id="tabVideo">🎬 映像+音声</button>
    </div>

    <!-- 対象タブ名 -->
    <div class="target-tab" id="targetTab"><span>対象タブ:</span> 未選択</div>

    <!-- 映像プレビュー（映像モード時） -->
    <div class="video-preview-wrap" id="videoPreviewWrap">
      <video id="preview" muted playsinline></video>
      <div class="video-badge">LIVE PREVIEW</div>
    </div>

    <!-- 波形（音声モード時） -->
    <div class="waveform-container" id="waveformContainer">
      <canvas id="waveform" width="300" height="65"></canvas>
      <div class="waveform-label" id="waveformLabel">録音待機中...</div>
    </div>

    <!-- ステータスバー -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">待機中</span>
      <span class="timer-limit" id="timerLimit"></span>
      <span class="timer" id="timer">00:00</span>
    </div>

    <!-- ボタン -->
    <div class="btn-group">
      <button class="btn btn-start"   id="btnStart">● 開始</button>
      <button class="btn btn-pause"   id="btnPause"   disabled>⏸ 一時停止</button>
      <button class="btn btn-stop"    id="btnStop"    disabled>■ 停止・保存</button>
      <button class="btn btn-discard" id="btnDiscard" disabled>🗑 破棄</button>
    </div>

    <!-- MP3オプション（音声モードのみ表示） -->
    <div class="option-row" id="optionMp3">
      <input type="checkbox" id="chkMp3" />
      <label class="option-label" for="chkMp3">MP3に変換して保存</label>
      <span class="option-badge">lamejs</span>
    </div>

    <!-- 映像モード注意書き -->
    <div class="video-note" id="videoNote">
      保存形式: WebM（映像+音声） — 別タブに切り替えても録画継続<br>
      ※ ウィンドウ最小化時は映像が止まる場合があります
    </div>

    <!-- MP3変換進捗バー -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span class="progress-label" id="progressLabel">⏳ MP3に変換中...</span>
        <span class="progress-pct"   id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="saved-msg" id="savedMsg">✓ ファイルを保存しました</div>
    <div class="error-msg" id="errorMsg"></div>

    <!-- モニタリングトグル -->
    <div class="monitor-row">
      <span class="monitor-label">🔊 モニタリング（録音中に音を聞く）</span>
      <span class="monitor-status on" id="monitorStatus">ON</span>
      <button class="btn-monitor on" id="btnMonitor">切替</button>
    </div>

    <div class="format-info" id="formatInfo">保存形式: WebM — Google Gemini API 対応</div>

  </div>

  <script src="lib/lame.min.js"></script>
  <script src="recorder.js"></script>
</body>
</html>
